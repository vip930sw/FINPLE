services:
  - type: web
    name: finple-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: ASSET_DATA_PROVIDER
        value: alpha_vantage
      - key: FINPLE_AI_ANALYSIS_MODE
        value: mock
      - key: FINPLE_AI_ANALYSIS_PROVIDER
        value: none
      - key: OPENAI_API_KEY
        sync: false
      - key: FINPLE_AI_OPENAI_MODEL
        value: gpt-5.1
      - key: FINPLE_AI_OPENAI_TIMEOUT_MS
        value: "20000"
      - key: FINPLE_AI_OPENAI_MAX_OUTPUT_TOKENS
        value: "2200"
      - key: ASSET_PRICE_CURRENCY
        value: KRW
      - key: DEFAULT_USD_KRW_RATE
        value: "1350"
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_FETCH_FX
        value: "false"
      - key: ALPHA_VANTAGE_FETCH_OVERVIEW
        value: "false"
      - key: ASSET_CACHE_TTL_MS
        value: "86400000"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: FINPLE_ADMIN_TOKEN
        sync: false
      - key: SUPPORT_NOTIFY_EMAIL
        value: finple_lab@naver.com
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL_FROM
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_INQUIRY_BUCKET
        value: finple-inquiry-attachments

name: Backend Auth Stability Check

on:
  pull_request:
    paths:
      - "server/src/**"
      - "server/package.json"
      - "server/package-lock.json"
      - "src/components/authClientService.js"
      - ".github/workflows/backend-auth-stability-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-auth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Check backend syntax
        run: |
          node --check server/src/index.js
          node --check server/src/db/database.js
          node --check server/src/db/authLoginRepository.js
          node --check server/src/routes/authLoginRoutes.js
          node --check server/src/routes/healthRoutes.js
          node --check server/src/middleware/requestStability.js

      - name: Run backend stability tests
        run: node --test server/src/middleware/requestStability.test.js
